[bar]
scale = 0.9
"inset-edge" = 0.5
"inset-ends" = 1.0
"background-opacity" = 50
"border-width" = 0
rounding = "lg"
"button-variant" = "basic"

[[bar.layout]]
monitor = "*"
show = true
left = ["niri-workspaces", "clock", "weather"]
center = ["window-title"]
right = ["network", "bluetooth", "volume", "cpu", "ram", "dashboard"]

[styling]
scale = 1.0

[styling.palette]
bg = "#11111b"
surface = "#181825"
elevated = "#1e1e2e"
fg = "#cdd6f4"
"fg-muted" = "#bac2de"
primary = "#b4befe"
red = "#f38ba8"
yellow = "#f9e2af"
green = "#a6e3a1"
blue = "#74c7ec"

[modules.clock]
format = "%a, %b %-d %H:%M:%S"
icon-name = "tb-calendar-time-symbol"
border-color = "blue"
icon-color = "blue"
icon-bg-color = "blue"
label-color = "blue"
dropdown-show-seconds = true

[modules.cpu]
"icon-name" = "ld-cpu"

[modules.dashboard]
dropdown-lock-command = "hyprlock"
dropdown-logout-command = "niri msg action quit --skip-confirmation"

[modules."niri-workspaces"]
"hide-trailing-empty" = false
"active-color" = "status-warning"

[modules.ram]
"poll-interval-ms" = 2000
format = "{{ used_gib}} / {{ total_gib }} GiB"
"icon-name" = "ld-memory-stick"

[modules.weather]
location = "Jersey City"
units = "imperial"
